services:
  proxy:
    build: .
    container_name: llmzone-proxy
    ports:
      - "${PROXY_PORT:-8081}:8081"
    env_file:
      - .env
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    mem_limit: 256m
    cpus: 1.0
